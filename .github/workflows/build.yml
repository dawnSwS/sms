name: Build LSPosed Module

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Inject CI/CD Secrets
        run: |
          echo "SYS_INSTR=${{ vars.SYS_INSTR }}" > local.properties
          echo "API_KEY=${{ secrets.API_KEY }}" >> local.properties
          echo "CF_API_KEY=${{ secrets.CF_API_KEY }}" >> local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Build Debug and Release APKs
        run: gradle :app:assembleDebug :app:assembleRelease --no-daemon --parallel

      - name: Sign Debug APK
        uses: r0adkll/sign-android-release@v1
        id: sign_debug
        with:
          releaseDirectory: app/build/outputs/apk/debug
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Debug Version
        uses: actions/upload-artifact@v4
        with:
          name: AppCore-Debug
          path: ${{ steps.sign_debug.outputs.signedReleaseFile }}

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_release
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Release Version
        uses: actions/upload-artifact@v4
        with:
          name: AppCore-Release
          path: ${{ steps.sign_release.outputs.signedReleaseFile }}